# À placer sur le VPS, ex. : /etc/nginx/sites-available/warignan.com
# puis : ln -s ... sites-enabled/ && nginx -t && systemctl reload nginx
# Adapter root si le clone n'est pas dans /var/www/warignan-shop
# HTTPS : certbot --nginx -d warignan.com -d www.warignan.com

server {
    listen 80;
    listen [::]:80;
    server_name warignan.com www.warignan.com;

    root /var/www/warignan-shop/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
